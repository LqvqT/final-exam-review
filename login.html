<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 · 江小白的期末周</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page">

<div class="login-card">
  <img src="img/avatar.jpg" alt="江小白" class="login-avatar">
  <h2>江小白的期末周</h2>
  <p class="login-sub">输入密码，开启复习之旅</p>

  <div class="input-group">
    <label>👤 昵称</label>
    <input type="text" id="nickname" placeholder="请输入昵称" autocomplete="off">
  </div>
  <div class="input-group">
    <label>🔒 密码</label>
    <input type="password" id="password" placeholder="请输入密码">
  </div>

  <div class="error-msg" id="errorMsg"></div>

  <button class="login-btn" id="loginBtn" onclick="doLogin()">🚀 进入复习</button>
</div>

<!-- 全屏过渡动画 -->
<div class="cinematic-overlay" id="overlay" style="display:none;">
  <div class="starfield" id="starfield"></div>

  <!-- 霸屏视频层 -->
  <video class="cinema-video" id="cinemaVideo" src="img/transition.mp4" muted playsinline preload="auto"></video>

  <!-- 前景内容 -->
  <div class="cinematic-content">
    <div class="cinema-avatar-wrap">
      <div class="avatar-ring"></div>
      <img src="img/avatar.jpg" alt="江小白" class="cinema-avatar">
    </div>
    <div class="cinema-title" id="welcomeText"></div>
    <div class="cinema-sub">三小只前来助阵，期末必过！</div>
    <div class="cinema-progress"><div class="cinema-progress-fill"></div></div>
  </div>
</div>

<script>
function doLogin() {
  const nickname = document.getElementById('nickname').value.trim();
  const password = document.getElementById('password').value;
  const errorMsg = document.getElementById('errorMsg');
  const btn = document.getElementById('loginBtn');

  if (nickname !== '江小白') {
    errorMsg.textContent = '昵称不正确哦～';
    return;
  }
  if (password !== 'jxb123') {
    errorMsg.textContent = '密码错误，再想想～';
    return;
  }

  // 登录成功
  errorMsg.textContent = '';
  btn.disabled = true;
  btn.textContent = '✓ 验证通过';

  // 启动全屏视频过渡动画
  const overlay = document.getElementById('overlay');
  const welcomeText = document.getElementById('welcomeText');
  const starfield = document.getElementById('starfield');
  const video = document.getElementById('cinemaVideo');

  overlay.style.display = 'flex';
  welcomeText.textContent = '欢迎回来，江小白 ✨';

  // 150颗星星
  for (let i = 0; i < 150; i++) {
    const star = document.createElement('span');
    star.className = 'star';
    star.style.left = Math.random() * 100 + '%';
    star.style.top = Math.random() * 100 + '%';
    star.style.width = star.style.height = (1 + Math.random() * 3) + 'px';
    star.style.setProperty('--dur', (1.5 + Math.random() * 3) + 's');
    star.style.setProperty('--delay', Math.random() * 3 + 's');
    starfield.appendChild(star);
  }

  // 跳转函数
  let jumped = false;
  function doRedirect() {
    if (jumped) return;
    jumped = true;
    video.pause();
    overlay.classList.add('fadeout');
    setTimeout(() => {
      sessionStorage.setItem('jxb_logged_in', 'true');
      window.location.href = 'index.html';
    }, 600);
  }

  video.addEventListener('ended', doRedirect);
  video.play().catch(() => { video.muted = true; video.play(); });

  // 6秒后跳转
  setTimeout(doRedirect, 6000);
}

// 回车登录
document.getElementById('password').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doLogin();
});
document.getElementById('nickname').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') document.getElementById('password').focus();
});
</script>

</body>
</html>
