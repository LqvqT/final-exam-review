<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 · 江小白的期末周</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page">

<div class="login-card">
  <img src="img/avatar.jpg" alt="江小白" class="login-avatar">
  <h2>江小白的期末周</h2>
  <p class="login-sub">输入密码，开启复习之旅</p>

  <div class="input-group">
    <label>👤 昵称</label>
    <input type="text" id="nickname" placeholder="请输入昵称" autocomplete="off">
  </div>
  <div class="input-group">
    <label>🔒 密码</label>
    <input type="password" id="password" placeholder="请输入密码">
  </div>

  <div class="error-msg" id="errorMsg"></div>

  <button class="login-btn" id="loginBtn" onclick="doLogin()">🚀 进入复习</button>
</div>

<!-- 全屏过渡动画 -->
<div class="cinematic-overlay" id="overlay" style="display:none;">
  <div class="starfield" id="starfield"></div>

  <!-- 霸屏图片层 -->
  <div class="hero-image-stage" id="heroStage">
    <img id="heroImg" src="" alt="" class="hero-image">
    <div class="hero-label" id="heroLabel"></div>
    <div class="hero-sparkles" id="heroSparkles"></div>
  </div>

  <!-- 前景内容 -->
  <div class="cinematic-content">
    <div class="cinema-avatar-wrap">
      <div class="avatar-ring"></div>
      <img src="img/avatar.jpg" alt="江小白" class="cinema-avatar">
    </div>
    <div class="cinema-title" id="welcomeText"></div>
    <div class="cinema-sub">三小只前来助阵，期末必过！</div>
    <div class="cinema-progress"><div class="cinema-progress-fill"></div></div>
  </div>
</div>

<script>
function doLogin() {
  const nickname = document.getElementById('nickname').value.trim();
  const password = document.getElementById('password').value;
  const errorMsg = document.getElementById('errorMsg');
  const btn = document.getElementById('loginBtn');

  if (nickname !== '江小白') {
    errorMsg.textContent = '昵称不正确哦～';
    return;
  }
  if (password !== 'jxb123') {
    errorMsg.textContent = '密码错误，再想想～';
    return;
  }

  // 登录成功
  errorMsg.textContent = '';
  btn.disabled = true;
  btn.textContent = '✓ 验证通过';

  // 启动全屏电影级过渡动画
  const overlay = document.getElementById('overlay');
  const welcomeText = document.getElementById('welcomeText');
  const starfield = document.getElementById('starfield');
  const heroImg = document.getElementById('heroImg');
  const heroLabel = document.getElementById('heroLabel');
  const heroSparkles = document.getElementById('heroSparkles');

  overlay.style.display = 'flex';
  welcomeText.textContent = '欢迎回来，江小白 ✨';

  // 150颗星星
  for (let i = 0; i < 150; i++) {
    const star = document.createElement('span');
    star.className = 'star';
    star.style.left = Math.random() * 100 + '%';
    star.style.top = Math.random() * 100 + '%';
    star.style.width = star.style.height = (1 + Math.random() * 3) + 'px';
    star.style.setProperty('--dur', (1.5 + Math.random() * 3) + 's');
    star.style.setProperty('--delay', Math.random() * 3 + 's');
    starfield.appendChild(star);
  }

  // 8颗流星
  for (let i = 0; i < 8; i++) {
    const meteor = document.createElement('span');
    meteor.className = 'shooting-star';
    meteor.style.left = (20 + Math.random() * 60) + '%';
    meteor.style.top = Math.random() * 40 + '%';
    meteor.style.setProperty('--delay', (i * 0.4 + Math.random()) + 's');
    starfield.appendChild(meteor);
  }

  // 四张图片轮流展示
  const pool = [
    { src: 'img/chiikawa.jpg', label: '🐣 吉伊' },
    { src: 'img/hachiware.jpg', label: '🐱 小八' },
    { src: 'img/usagi.jpg', label: '🐰 乌萨奇' },
  ];
  // 前三张随机打乱
  for (let i = pool.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [pool[i], pool[j]] = [pool[j], pool[i]];
  }
  // 最后一张：三小只同框
  const sequence = [...pool, { src: 'img/three.jpg', label: '💫 三小只集合！' }];

  let imgIndex = 0;
  const totalDuration = 5000; // 总时长5秒
  const imgInterval = totalDuration / sequence.length; // 每张约1.25秒

  function showImage(idx) {
    if (idx >= sequence.length) return;
    const item = sequence[idx];

    // 生成光点
    heroSparkles.innerHTML = '';
    for (let i = 0; i < 20; i++) {
      const dot = document.createElement('span');
      dot.className = 'hero-dot';
      dot.style.left = Math.random() * 100 + '%';
      dot.style.top = Math.random() * 100 + '%';
      dot.style.animationDelay = Math.random() * 0.5 + 's';
      heroSparkles.appendChild(dot);
    }

    heroImg.classList.remove('hero-in');
    void heroImg.offsetWidth;
    heroImg.src = item.src;
    heroImg.alt = item.label;
    heroLabel.textContent = item.label;
    heroImg.classList.add('hero-in');

    // 最后一张特殊效果
    if (idx === sequence.length - 1) {
      heroImg.style.animation = 'heroZoomFinal 2s ease-out forwards';
      heroLabel.style.fontSize = '1.4em';
      heroLabel.style.color = '#fde68a';
    }

    imgIndex++;
    if (imgIndex < sequence.length) {
      setTimeout(() => showImage(imgIndex), imgInterval);
    }
  }

  // 0.5秒后开始展示
  setTimeout(() => showImage(0), 500);

  // 总时长后淡出跳转
  setTimeout(() => {
    overlay.classList.add('fadeout');
    setTimeout(() => {
      sessionStorage.setItem('jxb_logged_in', 'true');
      window.location.href = 'index.html';
    }, 600);
  }, totalDuration + 600);
}

// 回车登录
document.getElementById('password').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doLogin();
});
document.getElementById('nickname').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') document.getElementById('password').focus();
});
</script>

</body>
</html>
