<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 · 江小白的期末周</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page">

<div class="login-card">
  <img src="img/avatar.jpg" alt="江小白" class="login-avatar">
  <h2>江小白的期末周</h2>
  <p class="login-sub">输入密码，开启复习之旅</p>

  <div class="input-group">
    <label>👤 昵称</label>
    <input type="text" id="nickname" placeholder="请输入昵称" autocomplete="off">
  </div>
  <div class="input-group">
    <label>🔒 密码</label>
    <input type="password" id="password" placeholder="请输入密码">
  </div>

  <div class="error-msg" id="errorMsg"></div>

  <button class="login-btn" id="loginBtn" onclick="doLogin()">🚀 进入复习</button>
</div>

<!-- 过渡动画层 -->
<div class="login-overlay" id="overlay" style="display:none;">
  <div class="spark-container" id="sparkContainer"></div>
  <img src="img/avatar.jpg" alt="江小白" style="width:90px;height:90px;border-radius:50%;object-fit:cover;border:3px solid rgba(255,255,255,0.3);margin-bottom:16px;box-shadow:0 0 40px rgba(233,68,96,0.4);">
  <div class="welcome-text" id="welcomeText"></div>
  <!-- 吉伊咔哇三小只 -->
  <div class="chiikawa-row">
    <div class="chiikawa char1">
      <img src="img/chiikawa.jpg" alt="吉伊" class="chii-img">
      <span class="chii-name">吉伊</span>
    </div>
    <div class="chiikawa char2">
      <img src="img/hachiware.jpg" alt="小八" class="chii-img">
      <span class="chii-name">小八</span>
    </div>
    <div class="chiikawa char3">
      <img src="img/usagi.jpg" alt="乌萨奇" class="chii-img">
      <span class="chii-name">乌萨奇</span>
    </div>
  </div>
  <div class="loading-ring"></div>
</div>

<script>
function doLogin() {
  const nickname = document.getElementById('nickname').value.trim();
  const password = document.getElementById('password').value;
  const errorMsg = document.getElementById('errorMsg');
  const btn = document.getElementById('loginBtn');

  if (nickname !== '江小白') {
    errorMsg.textContent = '昵称不正确哦～';
    return;
  }
  if (password !== 'jxb123') {
    errorMsg.textContent = '密码错误，再想想～';
    return;
  }

  // 登录成功
  errorMsg.textContent = '';
  btn.disabled = true;
  btn.textContent = '✓ 验证通过';

  // 启动过渡动画
  const overlay = document.getElementById('overlay');
  const welcomeText = document.getElementById('welcomeText');
  const sparkContainer = document.getElementById('sparkContainer');

  overlay.style.display = 'flex';
  welcomeText.textContent = '吉伊咔哇三小只来接你啦～ ✨';

  // 生成粒子
  for (let i = 0; i < 40; i++) {
    const spark = document.createElement('span');
    spark.className = 'spark';
    spark.style.left = '50%';
    spark.style.top = '50%';
    spark.style.setProperty('--dx', (Math.random() - 0.5) * 400 + 'px');
    spark.style.setProperty('--dy', (Math.random() - 0.5) * 400 + 'px');
    spark.style.animationDelay = Math.random() * 0.6 + 's';
    spark.style.background = ['#fffef5','#dce8f5','#fff8e1','#ffccd5','#c5e0d5','#fde68a'][Math.floor(Math.random()*6)];
    sparkContainer.appendChild(spark);
  }

  // 延迟后跳转
  setTimeout(() => {
    overlay.style.opacity = '0';
    overlay.style.transition = 'opacity 0.5s';
    setTimeout(() => {
      sessionStorage.setItem('jxb_logged_in', 'true');
      window.location.href = 'index.html';
    }, 500);
  }, 2200);
}

// 回车登录
document.getElementById('password').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doLogin();
});
document.getElementById('nickname').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') document.getElementById('password').focus();
});
</script>

</body>
</html>
