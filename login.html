<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 · 江小白的期末周</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page">

<div class="login-card">
  <img src="img/avatar.jpg" alt="江小白" class="login-avatar">
  <h2>江小白的期末周</h2>
  <p class="login-sub">输入密码，开启复习之旅</p>

  <div class="input-group">
    <label>👤 昵称</label>
    <input type="text" id="nickname" placeholder="请输入昵称" autocomplete="off">
  </div>
  <div class="input-group">
    <label>🔒 密码</label>
    <input type="password" id="password" placeholder="请输入密码">
  </div>

  <div class="error-msg" id="errorMsg"></div>

  <button class="login-btn" id="loginBtn" onclick="doLogin()">🚀 进入复习</button>
</div>

<!-- 全屏过渡动画 -->
<div class="cinematic-overlay" id="overlay" style="display:none;">
  <div class="starfield" id="starfield"></div>
  <div class="cinematic-content">
    <!-- 头像 -->
    <div class="cinema-avatar-wrap">
      <div class="avatar-ring"></div>
      <img src="img/avatar.jpg" alt="江小白" class="cinema-avatar">
    </div>
    <!-- 欢迎文字 -->
    <div class="cinema-title" id="welcomeText"></div>
    <div class="cinema-sub">三小只前来助阵，期末必过！</div>
    <!-- 三小只 -->
    <div class="chiikawa-stage">
      <div class="chiikawa char1">
        <div class="chii-card"><img src="img/chiikawa.jpg" alt="吉伊"></div>
        <span class="chii-label">吉伊</span>
      </div>
      <div class="chiikawa char2">
        <div class="chii-card"><img src="img/hachiware.jpg" alt="小八"></div>
        <span class="chii-label">小八</span>
      </div>
      <div class="chiikawa char3">
        <div class="chii-card"><img src="img/usagi.jpg" alt="乌萨奇"></div>
        <span class="chii-label">乌萨奇</span>
      </div>
    </div>
    <!-- 进度条 -->
    <div class="cinema-progress"><div class="cinema-progress-fill"></div></div>
  </div>
</div>

<script>
function doLogin() {
  const nickname = document.getElementById('nickname').value.trim();
  const password = document.getElementById('password').value;
  const errorMsg = document.getElementById('errorMsg');
  const btn = document.getElementById('loginBtn');

  if (nickname !== '江小白') {
    errorMsg.textContent = '昵称不正确哦～';
    return;
  }
  if (password !== 'jxb123') {
    errorMsg.textContent = '密码错误，再想想～';
    return;
  }

  // 登录成功
  errorMsg.textContent = '';
  btn.disabled = true;
  btn.textContent = '✓ 验证通过';

  // 启动全屏电影级过渡动画
  const overlay = document.getElementById('overlay');
  const welcomeText = document.getElementById('welcomeText');
  const starfield = document.getElementById('starfield');

  overlay.style.display = 'flex';
  welcomeText.textContent = '欢迎回来，江小白 ✨';

  // 150颗星星
  for (let i = 0; i < 150; i++) {
    const star = document.createElement('span');
    star.className = 'star';
    star.style.left = Math.random() * 100 + '%';
    star.style.top = Math.random() * 100 + '%';
    star.style.width = star.style.height = (1 + Math.random() * 3) + 'px';
    star.style.setProperty('--dur', (1.5 + Math.random() * 3) + 's');
    star.style.setProperty('--delay', Math.random() * 3 + 's');
    starfield.appendChild(star);
  }

  // 8颗流星
  for (let i = 0; i < 8; i++) {
    const meteor = document.createElement('span');
    meteor.className = 'shooting-star';
    meteor.style.left = (20 + Math.random() * 60) + '%';
    meteor.style.top = Math.random() * 40 + '%';
    meteor.style.setProperty('--delay', (i * 0.4 + Math.random()) + 's');
    starfield.appendChild(meteor);
  }

  // 3.6秒后淡出跳转
  setTimeout(() => {
    overlay.classList.add('fadeout');
    setTimeout(() => {
      sessionStorage.setItem('jxb_logged_in', 'true');
      window.location.href = 'index.html';
    }, 600);
  }, 3600);
}

// 回车登录
document.getElementById('password').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doLogin();
});
document.getElementById('nickname').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') document.getElementById('password').focus();
});
</script>

</body>
</html>
